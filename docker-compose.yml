version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mundial-tennis-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: mundialtennis
    volumes:
      - /opt/docker-apps/iniciativa-mundial/postgresql/postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - dokploy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  mundial-tennis:
    build: .
    container_name: mundial-tennis
    ports:
      - "80:3059"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/mundialtennis}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dokploy-network
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
