<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚽ Mundial Tennis 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Roboto:wght@300;400;500;700&amp;display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ── PALETA TENNIS BRAND ── */
:root{
  /* Fondos — charcoal cálido extraído de fachada Tennis */
  --az:  #1A1815;   /* fondo principal  (era navy)     */
  --az2: #201D17;   /* tarjetas         (era blue card) */
  --az3: #2A2620;   /* tarjetas claras  (era light blue)*/
  /* Verdes para indicadores — sage muted */
  --vd:  #3E6644;
  --vd2: #579960;
  /* Oro del torneo — acento principal, cálido */
  --or:  #C9A84C;
  --or2: #E8C878;   /* oro suave (era amarillo FIFA) */
  /* Acento Tennis — gris-oliva cálido de la fachada */
  --tn:  #727068;   /* Tennis neutral */
  --tn2: #9d7e65;   /* Tennis warm interior */
  --tn3: #F0E8DC;   /* Tennis cream — texto destacado */
  /* Otros */
  --rd:  #C0392B;
  --pu:  #6A4A60;
  --bl:  #3A6880;
  --w:   #fff;
  --g3:  #9A9088;
  --sh:  0 4px 24px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Roboto',sans-serif;background:#111010;color:#F0E8DC;min-height:100vh}
/* HEADER */
.hdr{background:linear-gradient(135deg,var(--az) 0%,#1a2d6e 55%,var(--vd) 100%);
  padding:0 18px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.hdr-l{display:flex;align-items:center;gap:12px;padding:11px 0}
.ball{font-size:2rem;animation:spin 10s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.htitle{font-family:'Bebas Neue';font-size:1.6rem;color:var(--or2);letter-spacing:2px;line-height:1}
.hsub{font-size:.62rem;color:rgba(255,255,255,.58);letter-spacing:3px;text-transform:uppercase}
.hbadge{background:var(--or);color:var(--az);padding:5px 12px;border-radius:18px;font-size:.7rem;font-weight:700}
/* NAV */
.nav{background:rgba(13,27,75,.96);backdrop-filter:blur(6px);
  display:flex;overflow-x:auto;border-bottom:2px solid rgba(201,168,76,.35);
  scrollbar-width:none;position:sticky;top:58px;z-index:199}
.nav::-webkit-scrollbar{display:none}
.nb{flex:none;padding:10px 16px;cursor:pointer;font-size:.76rem;font-weight:600;
  color:rgba(255,255,255,.52);border:none;background:none;transition:.2s;
  text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;
  border-bottom:3px solid transparent;margin-bottom:-2px}
.nb:hover{color:var(--or2);background:rgba(255,255,255,.04)}
.nb.active{color:var(--or2);border-bottom-color:var(--or2);font-weight:700}
/* PAGES */
.page{display:none;padding:20px 18px;max-width:1440px;margin:0 auto;animation:fi .3s ease}
.page.active{display:block}
@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* CARD */
.card{background:var(--az2);border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,.07)}
/* SECTION TITLE */
.st{font-family:'Bebas Neue';font-size:1.35rem;color:var(--or2);letter-spacing:2px;
  margin-bottom:13px;display:flex;align-items:center;gap:8px}
.st::after{content:'';flex:1;height:2px;background:linear-gradient(90deg,var(--or2),transparent)}
/* KPI */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:11px;margin-bottom:22px}
.kpi{background:linear-gradient(135deg,var(--az2),var(--az3));border-radius:11px;
  padding:14px 10px;text-align:center;border:1px solid rgba(201,168,76,.2);transition:.2s}
.kpi:hover{transform:translateY(-2px);border-color:var(--or)}
.ki{font-size:1.6rem;margin-bottom:4px}
.kv{font-family:'Bebas Neue';font-size:1.9rem;color:var(--or2);line-height:1}
.kl{font-size:.6rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
/* TABLE */
.tw{overflow-x:auto;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:.79rem}
thead th{background:var(--az);color:var(--or2);padding:8px 10px;text-align:left;
  font-weight:700;text-transform:uppercase;font-size:.68rem;letter-spacing:.4px;
  cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{background:var(--az3)}
tbody tr{border-bottom:1px solid rgba(255,255,255,.05);transition:.1s}
tbody tr:hover{background:rgba(255,255,255,.05)}
tbody td{padding:7px 10px;vertical-align:middle}
.p1{background:rgba(201,168,76,.18)!important}
.p2{background:rgba(192,192,192,.1)!important}
.p3{background:rgba(200,120,50,.1)!important}
.pts{font-family:'Bebas Neue';font-size:1.2rem;color:var(--or2)}
.badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:.63rem;font-weight:700}
.bw{background:rgba(26,122,60,.55);color:#7effa0}
.bd{background:rgba(201,168,76,.4);color:var(--or2)}
.bl2{background:rgba(192,57,43,.45);color:#ff9999}
/* CONTROLS */
.ctrl{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.srch{flex:1;min-width:170px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);
  border-radius:8px;padding:8px 13px;color:#fff;font-size:.82rem;outline:none}
.srch::placeholder{color:rgba(255,255,255,.32)}
.srch:focus{border-color:var(--or)}
.sel{background:var(--az2);border:1px solid rgba(255,255,255,.16);border-radius:8px;
  padding:8px 11px;color:#fff;font-size:.78rem;cursor:pointer;outline:none}
.sel:focus{border-color:var(--or)}
/* WEEK BANNER */
.wb{border-radius:13px;padding:18px 22px;margin-bottom:20px;
  display:flex;flex-wrap:wrap;align-items:center;gap:14px;
  border:1px solid rgba(255,255,255,.1)}
.wb-info{flex:1;min-width:180px}
.wb-lbl{font-family:'Bebas Neue';font-size:1.5rem;letter-spacing:2px;line-height:1;margin-bottom:3px}
.wb-dates{font-size:.76rem;color:rgba(255,255,255,.6);margin-bottom:8px}
.wb-rule{background:rgba(255,255,255,.08);border-radius:8px;padding:8px 14px;font-size:.78rem;line-height:1.5}
.wb-rule b{color:var(--or2)}
.wstatus{font-size:.78rem;padding:5px 13px;border-radius:18px;font-weight:700;white-space:nowrap}
.sta{background:rgba(192,57,43,.5)!important;color:#ff9999}
.std{background:rgba(26,122,60,.5)!important;color:#7effa0}
.stp{background:rgba(255,255,255,.09)!important;color:rgba(255,255,255,.5)}
/* UPLOAD */
.upload-z{border:2px dashed rgba(255,255,255,.22);border-radius:13px;
  padding:28px 22px;text-align:center;cursor:pointer;transition:.2s;
  background:rgba(255,255,255,.03);position:relative;margin-bottom:18px}
.upload-z:hover,.upload-z.drag{border-color:var(--or2);background:rgba(201,168,76,.06)}
.up-icon{font-size:2.5rem;margin-bottom:8px;display:block}
.up-t{font-size:.95rem;font-weight:700;margin-bottom:5px}
.up-h{font-size:.78rem;color:rgba(255,255,255,.45);margin-bottom:10px}
.up-h b{color:var(--or2)}
.btn-up{display:inline-block;background:var(--or);color:var(--az);padding:8px 20px;
  border-radius:8px;font-weight:700;font-size:.82rem;pointer-events:auto;cursor:pointer}
.file-wrap{position:relative;display:inline-block;margin-bottom:8px}
.file-wrap input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;z-index:2}
.file-wrap .btn-up{pointer-events:none;position:relative;z-index:1}
.btn-drive{background:linear-gradient(135deg,#2980b9,#1A7A3C);border:none}
.up-loaded{display:flex;align-items:center;gap:10px;padding:11px 16px;
  background:rgba(26,122,60,.2);border:1px solid var(--vd2);border-radius:10px;margin-bottom:14px}
.up-loaded .ic{font-size:1.4rem}
.up-loaded .inf{flex:1}
.up-loaded .fn{font-weight:700;font-size:.86rem}
.up-loaded .fm{font-size:.7rem;color:rgba(255,255,255,.5)}
.btn-ch{background:rgba(255,255,255,.09);border:none;color:rgba(255,255,255,.65);
  padding:5px 11px;border-radius:6px;cursor:pointer;font-size:.72rem}
.btn-ch:hover{background:rgba(255,255,255,.18);color:#fff}
/* BUTTONS */
.abar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.btn{padding:7px 14px;border-radius:7px;border:none;cursor:pointer;font-size:.75rem;font-weight:700;transition:.2s}
.bsv{background:var(--vd);color:#fff}.bsv:hover{background:var(--vd2)}
.bex{background:var(--or);color:var(--az)}.bex:hover{background:var(--or2)}
.bcl{background:rgba(192,57,43,.4);color:#ff9999;border:1px solid rgba(192,57,43,.3)}.bcl:hover{background:rgba(192,57,43,.7)}
/* GROUP COMPETITION CARD */
.gc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(520px,1fr));gap:16px}
.gc{background:var(--az2);border-radius:13px;overflow:hidden;border:1px solid rgba(255,255,255,.07)}
.gc-hdr{padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.gc-hdr h3{font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:1.5px}
.gc-tipo{font-size:.65rem;padding:3px 10px;border-radius:10px;font-weight:700}
.gc-hdr-meta{font-size:.68rem;color:rgba(255,255,255,.45)}
.gc-cond{padding:7px 14px;font-size:.72rem;display:flex;align-items:center;gap:6px}
/* STORE ROW IN GROUP */
.store-row{display:grid;align-items:center;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.05);
  gap:6px;font-size:.78rem;transition:.1s}
.store-row:hover{background:rgba(255,255,255,.04)}
.store-row:last-child{border:none}
.sr-name{font-weight:600;font-size:.8rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-zona{font-size:.62rem;color:rgba(255,255,255,.4);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ind-box{text-align:center;min-width:70px}
.ind-val{font-size:.82rem;font-weight:700}
.ind-lbl{font-size:.58rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.3px}
.pts-box{text-align:center;min-width:50px}
.no-data{color:rgba(255,255,255,.25);font-style:italic;font-size:.7rem}
/* BADGES for winners */
.win-cumpl{color:#7effa0;font-size:.65rem;padding:1px 6px;background:rgba(26,122,60,.4);border-radius:4px}
.win-upt{color:#7ec8ff;font-size:.65rem;padding:1px 6px;background:rgba(41,128,185,.4);border-radius:4px}
.win-conv{color:#e0b0ff;font-size:.65rem;padding:1px 6px;background:rgba(106,26,122,.4);border-radius:4px}
.ineligible{opacity:.55}
.inel-tag{font-size:.62rem;color:#ff9999;padding:1px 6px;background:rgba(192,57,43,.3);border-radius:4px}
/* PROGRESS BAR */
.prog{background:rgba(255,255,255,.1);border-radius:3px;height:4px;overflow:hidden}
.prog-f{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--vd2),var(--or2));transition:width .5s}
/* WEEK STATS BAR */
.wstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:9px;margin-bottom:18px}
.ws{background:rgba(255,255,255,.04);border-radius:9px;padding:10px;text-align:center;border:1px solid rgba(255,255,255,.06)}
.wsv{font-family:'Bebas Neue';font-size:1.4rem;color:var(--or2)}
.wsl{font-size:.6rem;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.4px}
/* MODAL */
.mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:500;align-items:center;justify-content:center;padding:14px}
.mov.open{display:flex}
.mo{background:var(--az2);border-radius:15px;padding:22px;max-width:500px;
  width:100%;border:1px solid var(--or);position:relative;animation:fi .2s;max-height:90vh;overflow-y:auto}
.mx{position:absolute;top:12px;right:13px;cursor:pointer;font-size:1.2rem;
  color:rgba(255,255,255,.4);background:none;border:none}
.mx:hover{color:#fff}
/* PRIZE CARDS */
.pr-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:13px}
.pr{border-radius:12px;padding:16px;border:1px solid rgba(255,255,255,.1);display:flex;flex-direction:column;gap:7px}
.pr-ico{font-size:2rem}
.pr-t{font-family:'Bebas Neue';font-size:1.2rem;letter-spacing:1px}
.pr-val{font-size:1.5rem;font-weight:700}
.pr-d{font-size:.78rem;color:rgba(255,255,255,.7)}
.pr-c{font-size:.66rem;padding:2px 8px;background:rgba(255,255,255,.08);border-radius:8px;align-self:flex-start}
/* PODIUM */
.podium{display:flex;align-items:flex-start;justify-content:center;gap:14px;
  margin:12px 0 28px;padding-bottom:60px}
.pod{border-radius:14px;display:flex;flex-direction:column;align-items:center;
  padding:18px 16px 16px;min-width:150px;max-width:220px;flex:1;box-sizing:border-box}
.pod-1{background:linear-gradient(145deg,rgba(201,168,76,.32),rgba(201,168,76,.1));
  border:2px solid var(--or);transform:translateY(0);box-shadow:0 4px 24px rgba(201,168,76,.25)}
.pod-2{background:linear-gradient(145deg,rgba(180,180,180,.22),rgba(180,180,180,.07));
  border:1px solid #909090;transform:translateY(34px)}
.pod-3{background:linear-gradient(145deg,rgba(200,120,50,.22),rgba(200,120,50,.07));
  border:1px solid #c87533;transform:translateY(60px)}
.pod-ico{font-size:2.2rem;margin-bottom:6px;line-height:1}
.pod-n{font-size:.8rem;font-weight:700;text-align:center;line-height:1.35;
  margin-bottom:5px;word-break:break-word;width:100%}
.pod-pts{font-family:'Bebas Neue';font-size:1.7rem;color:var(--or2);margin:2px 0 4px;line-height:1}
.pod-val{font-size:1rem;font-weight:700;margin-top:6px;text-align:center}
.pod-div{width:70%;height:1px;background:rgba(255,255,255,.15);margin:8px auto}
/* CHART */
.chw{height:200px;position:relative}
/* SCROLL TOP */
.scrtop{position:fixed;bottom:20px;right:20px;background:var(--or);color:var(--az);
  border:none;border-radius:50%;width:40px;height:40px;font-size:1rem;cursor:pointer;
  display:none;align-items:center;justify-content:center;z-index:300;box-shadow:var(--sh)}
.scrtop.show{display:flex}
/* TOAST */
.toast{position:fixed;bottom:65px;left:50%;transform:translateX(-50%);
  background:#1a1a2e;border:1px solid var(--or);color:#fff;padding:9px 18px;
  border-radius:7px;font-size:.8rem;z-index:600;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
/* ERR */
.err{background:rgba(192,57,43,.2);border:1px solid var(--rd);border-radius:8px;
  padding:10px 14px;margin-bottom:12px;font-size:.8rem;color:#ff9999}
/* RESPONSIVE */
@media(max-width:600px){
  .htitle{font-size:1.3rem}.page{padding:13px 11px}
  .gc-grid{grid-template-columns:1fr}.pr-wrap{grid-template-columns:1fr}
}
/* GROUP TYPE COLORS */
.tipo-linea{background:rgba(26,122,60,.35);color:#7effa0}
.tipo-outlet{background:rgba(41,128,185,.35);color:#7ec8ff}
.tipo-remat{background:rgba(192,57,43,.35);color:#ff9999}
/* ── TENNIS BRAND HEADER ── */
.hdr{position:relative;overflow:hidden;padding:0;min-height:72px;
  background:linear-gradient(135deg,#1A1815 0%,#252018 55%,#1E1A14 100%);
  border-bottom:2px solid var(--or)}
/* Separador vertical cálido en el header */
.hdr-divider{width:1px;height:40px;background:rgba(201,168,76,.3);margin:0 16px;flex-shrink:0}
.hdr-content{position:relative;z-index:2;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;height:72px}
/* Logo Tennis — nombre limpio, tipografía de marca */
.hdr-logo-wrap{display:flex;align-items:center;gap:0;flex-shrink:0;height:50px;
  border-right:1px solid rgba(201,168,76,.25);padding-right:18px}
.hdr-logo-text{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.hdr-logo-text .brand-name{font-family:'Roboto',sans-serif;font-weight:300;
  font-size:1.7rem;color:var(--tn3);letter-spacing:8px;line-height:1;
  text-transform:lowercase}
.hdr-logo-text .brand-tagline{font-size:.52rem;color:var(--or);letter-spacing:4px;
  text-transform:uppercase;font-weight:500}
/* Title central */
.hdr-center{flex:1;text-align:center;padding:0 12px}
.htitle{font-family:'Bebas Neue';font-size:1.45rem;color:var(--or2);
  letter-spacing:3px;line-height:1}
.hsub{font-size:.56rem;color:rgba(240,232,220,.5);letter-spacing:4px;
  text-transform:uppercase;margin-top:3px}
/* Motto band — Tennis cream oscuro */
.motto{background:#161310;border-bottom:1px solid rgba(201,168,76,.2);
  text-align:center;padding:8px 20px}
.motto-text{font-size:.72rem;font-style:italic;
  color:rgba(240,232,220,.58);letter-spacing:.5px}
.motto-text b{color:var(--or2);font-style:normal}
/* NAV — charcoal cálido Tennis */
.nav{background:rgba(26,24,21,.97)!important;
  border-bottom:2px solid rgba(201,168,76,.3)!important}
.nb.active{color:var(--or2)!important;border-bottom-color:var(--or)!important}
.nb:hover{color:var(--tn3)!important;background:rgba(201,168,76,.06)!important}
/* CARD — tierra cálida Tennis */
.card{background:var(--az2)!important;border-color:rgba(201,168,76,.1)!important}
/* SECTION TITLE */
.st{color:var(--or2)!important}
.st::after{background:linear-gradient(90deg,var(--or),transparent)!important}
/* KPI cards */
.kpi{background:linear-gradient(135deg,var(--az2),var(--az3))!important;
  border-color:rgba(201,168,76,.18)!important}
.kv{color:var(--or2)!important}
/* BADGE header */
.hbadge{background:var(--or)!important;color:#1A1815!important;font-weight:700!important}
/* TABLE headers */
thead th{background:var(--az)!important;color:var(--or2)!important}
thead th:hover{background:var(--az3)!important}
/* WEEK BANNER */
.wb{background:linear-gradient(135deg,rgba(201,168,76,.12),var(--az2))!important}
/* TYPE BADGES — Tennis tones */
.tipo-linea{background:rgba(62,102,68,.45);color:#9BDFAA}
.tipo-outlet{background:rgba(58,104,128,.45);color:#9ED4F0}
.tipo-remat{background:rgba(192,57,43,.35);color:#FFB0A8}
/* UPLOAD ZONE */
.upload-z{border-color:rgba(201,168,76,.25)!important;
  background:rgba(201,168,76,.03)!important}
.upload-z:hover,.upload-z.drag{border-color:var(--or2)!important;
  background:rgba(201,168,76,.08)!important}
/* SCROLL TOP */
.scrtop{background:var(--or)!important;color:#1A1815!important}
/* PODIUM dark-mode override */
.pod-1{background:linear-gradient(145deg,rgba(201,168,76,.30),rgba(201,168,76,.10))!important;
  border:2px solid var(--or)!important;box-shadow:0 4px 24px rgba(201,168,76,.22)!important}
/* AWARDS */
.award{background:var(--az2)!important}
/* ── BALÓN TNS ── */
.tns-ball{display:inline-block;border-radius:50%;
  box-shadow:0 6px 28px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.4),
             inset 0 -3px 8px rgba(0,0,0,.15);
  overflow:hidden;flex-shrink:0;background:#fff}
.tns-ball img{width:100%;height:100%;object-fit:cover;
  display:block;border-radius:50%}
/* Ball sizes */
.ball-xl{width:120px;height:120px}
.ball-lg{width:80px;height:80px}
.ball-md{width:52px;height:52px}
.ball-sm{width:36px;height:36px}
.ball-xs{width:24px;height:24px}
/* Animated ball (float) */
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}
  50%{transform:translateY(-8px) rotate(6deg)}}
.ball-float{animation:float 4s ease-in-out infinite}
/* Ball separator */
.ball-sep{display:flex;align-items:center;gap:14px;margin:22px 0}
.ball-sep::before,.ball-sep::after{content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.35),transparent)}
/* Ball hero row */
.ball-row{display:flex;justify-content:center;align-items:center;
  gap:20px;padding:12px 0;flex-wrap:wrap}
/* card-ball: watermark se inyecta via JS para evitar duplicar base64 */
.card-ball{position:relative;overflow:hidden}
.card-ball-wm{position:absolute;bottom:-16px;right:-16px;
  width:72px;height:72px;border-radius:50%;opacity:.08;
  object-fit:cover;pointer-events:none}
/* SPECIAL AWARD CARDS */

async function guardarConPicker(){
  try{

    if(!_fileHandle){
      _fileHandle=await window.showSaveFilePicker({

      });
    }
    const html=buildHtmlConDatos();
    if(!html){_fileHandle=null;return 'error';}
    const w=await _fileHandle.createWritable();
    await w.write(html); await w.close();
    return 'ok';
  }catch(e){
    if(e.name==='AbortError')return 'cancelled'; // usuario cerró el diálogo
    _fileHandle=null;
    return 'error';
  }
}

// ── MÉTODO 2: Descarga clásica (Firefox / fallback) ──────────
function guardarComoDescarga(){
  const html=buildHtmlConDatos();
  if(!html)return false;
  try{
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='MUNDIAL_TENNIS_2026.html'; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),8000);

  if(!semsOK.length){toast('Carga al menos una semana antes de guardar',3500);return false;}

    if(r==='ok'){
      toast('✅ Archivo guardado en disco. Al reabrirlo los datos estarán disponibles.',4500);
      return true;
    }
    if(r==='cancelled')return false;
    // Si hubo error en el picker → intentar descarga
  }
  // Fallback: descarga
  const ok=guardarComoDescarga();
  if(ok){
    showModalDescarga();
    return true;
  }
  toast('Error al guardar. Intenta de nuevo.',4000);

}

// El backend lee el Excel (tiendas) y el JSON de grupos. Se combinan
// para asignar grupo_id y grupo_nombre a cada tienda.
async function loadCatalogFromBackend(){
  const [groupsResp, storesResp] = await Promise.all([
    fetch('/api/groups'),
    fetch('/api/stores')
  ]);
  if(!groupsResp.ok) throw new Error('No se pudieron cargar los grupos');
  if(!storesResp.ok) throw new Error('No se pudieron cargar las tiendas');

  D.grupos = await groupsResp.json();
  const stores = await storesResp.json();

  const groupMap = {};
  D.grupos.forEach(g => {
    g.tiendas.forEach(nombre => {
      groupMap[nombre.toUpperCase()] = {grupo_id: g.id, grupo_nombre: g.nombre};
    });
  });

  D.tiendas = stores.map(s => {
    const g = groupMap[s.nombre.toUpperCase()] || {grupo_id: -1, grupo_nombre: 'Sin grupo'};
    return {
      nombre: s.nombre,
      tipo: s.tipo,
      zona: s.zona,
      grupo_id: g.grupo_id,
      grupo_nombre: g.grupo_nombre
    };
  });

  // Sincronizar contadores con el catálogo real cargado desde el Excel
  META.total_tiendas = D.tiendas.length;
  META.total_grupos = D.grupos.length;
}

function parseExcelFull(input){
  return new Promise((res,rej)=>{
    const processBuffer=buf=>{
      try{
        const wb=XLSX.read(buf,{type:'array'});
        // Intentar primera hoja con datos (buscar hoja con Establecimiento)
        let ws=null;
        for(const sn of wb.SheetNames){
          const s=wb.Sheets[sn];
          const tmp=XLSX.utils.sheet_to_json(s,{header:1,defval:null,raw:true});
          if(findHdrRow(tmp)>=0){ws=s;break;}
        }
        if(!ws){rej('No se encontró la columna Establecimiento en ninguna hoja');return;}
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
        const hi=findHdrRow(rows);
        if(hi<0){rej('No se encontró la columna Establecimiento');return;}
        const hdrs=rows[hi];
        const colEst=hdrs.findIndex(h=>norm(String(h||'')).includes('ESTABLECIMIENTO'));
        if(colEst<0){rej('Columna Establecimiento no encontrada');return;}

        // Construir array de métricas con carry-forward (para encabezados de 2 filas con celdas fusionadas)
        // Buscar la última fila no vacía antes de hi (es la fila de métricas)
        let metRow=[];
        for(let r=hi-1;r>=Math.max(0,hi-5);r--){
          if(rows[r]&&rows[r].some(c=>c!=null&&String(c).trim()!=='')){
            metRow=rows[r]; break;
          }
        }
        // Carry-forward: si la celda de métrica está vacía, usar la anterior
        const metNorm=[];let lastM='';
        for(let i=0;i<Math.max(hdrs.length,metRow.length);i++){
          const v=metRow[i]!=null?norm(String(metRow[i])):'';
          if(v)lastM=v;
          metNorm[i]=lastM;
        }

        // Buscar columna: primero por (métrica en fila superior + año en fila header)
        // Luego fallback a búsqueda en una sola fila (por si el Excel cambia estructura)
        function findColM(keyword,altKeywords){
          const kws=[keyword,...(altKeywords||[])].map(k=>norm(k));
          // Modo 2 filas: métrica + año
          for(let i=0;i<hdrs.length;i++){
            const m=metNorm[i]||'';
            const yr=norm(String(hdrs[i]||''));
            const metMatch=kws.some(k=>m.includes(k));
            const yr2026=yr.includes('2026')&&!yr.includes('2025');
            if(metMatch&&yr2026)return i;
          }
          // Fallback modo 1 fila: todo en la misma celda
          for(let i=0;i<hdrs.length;i++){
            const s=norm(String(hdrs[i]||''));
            if(kws.some(k=>s.includes(k))&&s.includes('2026')&&!s.includes('2025'))return i;
          }
          return -1;
        }

        const colV  =findColM('VENTA',['VENTA AL DIA']);
        const colP  =findColM('PRESUPUESTO');
        const colU  =findColM('ARTICULOS',['ARTICULOS POR TICKET','ART POR TICKET']);
        const colC  =findColM('TASA',['TASA DE CONVERSION','CONVERSION']);
        const colTK =findColM('VALOR TICKET',['TICKET PROMEDIO','PROMEDIO']);

        if(colV<0||colP<0){
          const found=[];
          if(colV>=0)found.push(`Venta=col${colV}`);
          if(colP>=0)found.push(`Ppto=col${colP}`);
          if(colU>=0)found.push(`UPT=col${colU}`);
          if(colC>=0)found.push(`Conv=col${colC}`);
          const missing=[];
          if(colV<0)missing.push('venta al día');
          if(colP<0)missing.push('presupuesto');
          rej(`Columnas 2026 no encontradas: ${missing.join(', ')}. `
            +`Encontradas: ${found.length?found.join(', '):'ninguna'}. `
            +'Asegúrate de usar el archivo Cubo de todos los canales con mes 2026.');
          return;
        }

        const SKIP=['TOTAL','CANAL TIENDAS','ALMACEN DE ','ALMACEN OUTLET','ALMACEN REMATADOR',
                    'ALMACEN LINEA','ALMACÉN DE','ALMACÉN OUTLET','ALMACÉN REMATADOR',
                    'ALMACÉN LINEA','ALMACÉN DE LÍNEA','ALMACEN DE LINEA'];
        const result={};
        for(let i=hi+1;i<rows.length;i++){
          const row=rows[i];if(!row)continue;
          const nombre=String(row[colEst]||'').trim();
          if(!nombre)continue;
          const nn=norm(nombre);
          if(SKIP.some(s=>nn.startsWith(norm(s)))||nn==='')continue;
          const vt=parseFloat(row[colV])||0;
          const pp=parseFloat(row[colP])||0;
          const cumpl=(vt>0&&pp>0)?vt/pp:null;
          const upt  =colU>=0?(parseFloat(row[colU])||null):null;
          const conv =colC>=0?(parseFloat(row[colC])||null):null;
          const ticket=colTK>=0?(parseFloat(row[colTK])||null):null;
          result[nombre]={cumpl,upt,conv,venta:vt,presupuesto:pp,ticket};
        }
        if(Object.keys(result).length===0){
          rej('No se encontraron tiendas en el archivo. Verifica que el Excel no esté filtrado o vacío.');
          return;
        }
        res(result);
      }catch(err){rej('Error leyendo archivo: '+err.message);}
    };
    if(input instanceof ArrayBuffer){
      processBuffer(input);
    }else{
      const reader=new FileReader();
      reader.onload=e=>processBuffer(e.target.result);
      reader.onerror=()=>rej('Error al leer el archivo');
      reader.readAsArrayBuffer(input);
    }
  });
}

// ── MATCH STORE NAME ─────────────────────────────────────────
// Intenta coincidir nombre de tienda del dashboard con nombre en el Excel
// (exacto → normalizado → parcial)
function matchStore(nombre, data){
  if(!data) return null;
  // Exacto
  if(data[nombre]!=null) return data[nombre];
  const nn=norm(nombre);
  // Normalizado exacto
  for(const k of Object.keys(data)) if(norm(k)===nn) return data[k];
  // Normalizado parcial (uno contiene al otro)
  const keys=Object.keys(data);
  for(const k of keys){const kn=norm(k);if(nn.includes(kn)||kn.includes(nn))return data[k];}
  return null;
}

// ── POINTS ENGINE ─────────────────────────────────────────────
// Retorna {storeName:{pts,pts_cumpl,pts_upt,pts_conv,eligible,cumpl,upt,conv}}
function calcGroupPts(grupo, semData){
  const result={};
  grupo.tiendas.forEach(n=>{
    const d=semData?matchStore(n,semData):null;
    const cumpl=d?d.cumpl:null;
    const eligible=cumpl!=null&&cumpl>=COND;
    result[n]={pts:0,pts_cumpl:0,pts_upt:0,pts_conv:0,eligible,
               cumpl,upt:d?d.upt:null,conv:d?d.conv:null,
               venta:d?d.venta:null,presupuesto:d?d.presupuesto:null};
  });
  if(!semData) return result;

  const elig=Object.entries(result).filter(([,v])=>v.eligible).map(([n,v])=>({n,...v}));
  const all =Object.entries(result).map(([n,v])=>({n,...v}));
  const EPS=1e-8;

  // ── Cumplimiento: mejor % entre las elegibles (todas ya son >= 100%)
  if(elig.length>0){
    const maxC=Math.max(...elig.map(e=>e.cumpl));
    elig.filter(e=>e.cumpl>=maxC-EPS).forEach(e=>{result[e.n].pts+=3;result[e.n].pts_cumpl=3;});
  }

  // ── UPT: el MEJOR del grupo COMPLETO (incluye no-elegibles)
  // Puntos solo si esa tienda con mejor UPT también cumple >= 100%
  // Si el mejor UPT no cumple → NADIE gana esos puntos
  const aupt=all.filter(e=>e.upt!=null&&e.upt>0);
  if(aupt.length){
    const mxU=Math.max(...aupt.map(e=>e.upt));
    // Marcar quién tiene el mejor UPT del grupo (para mostrar en UI)
    aupt.filter(e=>e.upt>=mxU-EPS).forEach(e=>{result[e.n].best_upt_grupo=true;});
    // Otorgar puntos solo si ese mejor UPT es además elegible
    aupt.filter(e=>e.upt>=mxU-EPS&&result[e.n].eligible)
        .forEach(e=>{result[e.n].pts+=3;result[e.n].pts_upt=3;});
  }

  // ── Conversión: el MEJOR del grupo COMPLETO (incluye no-elegibles)
  // Puntos solo si esa tienda con mejor Conv también cumple >= 100%
  const aconv=all.filter(e=>e.conv!=null&&e.conv>0);
  if(aconv.length){
    const mxV=Math.max(...aconv.map(e=>e.conv));
    // Marcar quién tiene la mejor Conv del grupo (para mostrar en UI)
    aconv.filter(e=>e.conv>=mxV-EPS).forEach(e=>{result[e.n].best_conv_grupo=true;});
    // Otorgar puntos solo si esa mejor Conv es además elegible
    aconv.filter(e=>e.conv>=mxV-EPS&&result[e.n].eligible)
         .forEach(e=>{result[e.n].pts+=3;result[e.n].pts_conv=3;});
  }

  return result;
}

// ── CUMULATIVE TABLE ──────────────────────────────────────────
function buildCumTable(){
  const T={};
  D.tiendas.forEach(t=>{
    T[t.nombre]={nombre:t.nombre,tipo:t.tipo,zona:t.zona,
      grupo_id:t.grupo_id,grupo_nombre:t.grupo_nombre,
      pts_total:0,pts_s1:0,pts_s2:0,pts_s3:0,pts_s4:0};
  });
  for(let s=1;s<=4;s++){
    const sd=weekData[s];
    if(!sd) continue;
    D.grupos.forEach(g=>{
      const gp=calcGroupPts(g,sd);
      g.tiendas.forEach(n=>{
        if(!T[n]) return;
        const v=gp[n]||{pts:0};
        T[n]['pts_s'+s]+=v.pts;
        T[n].pts_total+=v.pts;
      });
    });
  }
  return Object.values(T).sort((a,b)=>b.pts_total-a.pts_total);
}

// ── GROUP WEEKLY WINNERS (for prize display) ──────────────────
function getGroupWinners(sem){
  const sd=weekData[sem];if(!sd)return{};
  const winners={};
  D.grupos.forEach(g=>{
    const gp=calcGroupPts(g,sd);
    const rows=Object.entries(gp).map(([n,v])=>({n,...v}))
      .filter(r=>r.pts>0).sort((a,b)=>b.pts-a.pts);
    if(rows.length){
      const maxPts=rows[0].pts;
      winners[g.id]=rows.filter(r=>r.pts===maxPts).map(r=>r.n);
    }
  });
  return winners;
}

function getTopNGrupos(sem,n){
  const w=getGroupWinners(sem);

}

// ── GROUP CARD ────────────────────────────────────────────────
function groupCard(g, sem){
  const sd=weekData[sem]||null;
  const gp=calcGroupPts(g,sd);
  const tc=tipoClass(g.tipo);
  const ts=tipoShort(g.tipo);

  // Ordenar: elegibles primero, luego por pts
  const rows=g.tiendas.map(n=>{
    const t=D.tiendas.find(x=>x.nombre===n)||{};
    return {n,zona:t.zona||'',...gp[n]};
  }).sort((a,b)=>{
    if(a.eligible!==b.eligible)return b.eligible-a.eligible;
    return b.pts-a.pts;
  });

  const hasDatos=sd!=null;
  const anyElig=rows.some(r=>r.eligible);
  const condColor=hasDatos?(anyElig?'rgba(26,122,60,.2)':'rgba(192,57,43,.2)'):'rgba(255,255,255,.04)';
  const condTxt=hasDatos?(anyElig?'✅ Hay tiendas elegibles':'❌ Ninguna cumple 100% — sin puntos'):'⏳ Sin datos esta semana';

  // ¿Quién ganó cada categoría? (ganó = tiene el mejor indicador del grupo Y cumple ≥100%)
  const winCumpl=rows.filter(r=>r.pts_cumpl>0).map(r=>r.n);
  const winUPT  =rows.filter(r=>r.pts_upt>0).map(r=>r.n);
  const winConv =rows.filter(r=>r.pts_conv>0).map(r=>r.n);
  // ¿Quién tiene el mejor indicador ABSOLUTO del grupo? (incluye no-elegibles)
  const bestUPTg =rows.filter(r=>r.best_upt_grupo).map(r=>r.n);
  const bestConvg=rows.filter(r=>r.best_conv_grupo).map(r=>r.n);
  // ¿Se perdieron puntos? (hay mejor UPT/Conv pero no cumple)
  const uptPerdido =hasDatos&&bestUPTg.length>0&&winUPT.length===0;
  const convPerdido=hasDatos&&bestConvg.length>0&&winConv.length===0;

  // Grid columns dinámico
  const gcols=hasDatos?'1.8fr 1fr 1fr 1fr 60px':'2fr 50px';

  let inner=`<div class="gc" data-grp="${g.nombre.toLowerCase()}" data-tipo="${g.tipo}">
  <div class="gc-hdr" style="background:linear-gradient(135deg,${SCFG[sem]?.col||'#1A7A3C'}33,var(--az3))">
    <div>
      <h3>${g.nombre}</h3>
      <div class="gc-hdr-meta">${g.tiendas.length} tiendas · ${g.n_con_conv||0} con conversión</div>
    </div>
    <span class="gc-tipo badge ${tc}">${ts}</span>
  </div>
  <div class="gc-cond" style="background:${condColor}">
    <span>${condTxt}</span>
    ${uptPerdido||convPerdido?`<span style="margin-left:8px;font-size:.7rem;color:#ffb347">
      ⚠️ ${[uptPerdido?'UPT':'',convPerdido?'Conv':''].filter(Boolean).join('+')} sin otorgar — mejor indicador no cumplió</span>`:''}
  </div>
  <!-- HEADER INDICADORES -->
  <div style="display:grid;grid-template-columns:${gcols};padding:6px 14px;
    background:rgba(255,255,255,.03);font-size:.63rem;color:rgba(255,255,255,.4);
    text-transform:uppercase;letter-spacing:.5px;font-weight:700">
    <span>Tienda</span>
    ${hasDatos?`<span style="text-align:center">📈 Cumpl%</span>
    <span style="text-align:center">👟 UPT</span>
    <span style="text-align:center">🎯 Conv%</span>`:''}
    <span style="text-align:center">Pts</span>
  </div>`;

  rows.forEach(r=>{
    const isElig=r.eligible;
    const inelCls=hasDatos&&!isElig?'ineligible':'';
    const maxPts=Math.max(...rows.map(x=>x.pts),0);
    const pct=maxPts>0?Math.round(r.pts/maxPts*100):0;

    const cumplHl=winCumpl.includes(r.n)?`color:#7effa0;font-weight:700`:'';
    // UPT: verde si ganó puntos, amarillo si tiene el mayor UPT del grupo pero no cumplió
    const uptHl  =winUPT.includes(r.n)?`color:#7ec8ff;font-weight:700`
                 :(bestUPTg.includes(r.n)&&!r.eligible?`color:#ffb347;font-weight:700`:'');
    const convHl =winConv.includes(r.n)?`color:#e0b0ff;font-weight:700`
                 :(bestConvg.includes(r.n)&&!r.eligible?`color:#ffb347;font-weight:700`:'');

    inner+=`<div class="store-row ${inelCls}" style="grid-template-columns:${gcols};"
      onclick="openStoreModal('${r.n.replace(/'/g,"\'")}',${sem})">
      <div>
        <div class="sr-name">${r.n}
          ${r.pts===9?'<span style="font-size:.7rem">⭐</span>':''}
        </div>
        <div class="sr-zona">${r.zona}</div>
        ${hasDatos&&!isElig?`<span class="inel-tag">❌ cumpl < 100%</span>`:''}
        <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">
          ${winCumpl.includes(r.n)?'<span class="win-cumpl">📈 Best cumpl</span>':''}
          ${winUPT.includes(r.n)?'<span class="win-upt">👟 Best UPT</span>':''}
          ${winConv.includes(r.n)?'<span class="win-conv">🎯 Best conv</span>':''}
          ${bestUPTg.includes(r.n)&&!winUPT.includes(r.n)?'<span style="background:rgba(255,179,71,.15);color:#ffb347;border:1px solid rgba(255,179,71,.4);border-radius:4px;padding:1px 5px;font-size:.6rem">👟 Mayor UPT grupo</span>':''}
          ${bestConvg.includes(r.n)&&!winConv.includes(r.n)?'<span style="background:rgba(255,179,71,.15);color:#ffb347;border:1px solid rgba(255,179,71,.4);border-radius:4px;padding:1px 5px;font-size:.6rem">🎯 Mayor Conv grupo</span>':''}
        </div>
      </div>
      ${hasDatos?`
      <div class="ind-box">
        <div class="ind-val" style="${cumplHl}">${r.cumpl!=null?fP(r.cumpl):'—'}</div>
        ${r.cumpl!=null?`<div class="prog" style="margin-top:3px"><div class="prog-f" style="width:${Math.min(r.cumpl/1.5*100,100).toFixed(0)}%;background:${r.cumpl>=COND?'var(--vd2)':'var(--rd)'}"></div></div>`:''}
      </div>
      <div class="ind-box"><div class="ind-val" style="${uptHl}">${r.upt!=null?fN(r.upt):'—'}</div></div>
      <div class="ind-box"><div class="ind-val" style="${convHl}">${r.conv!=null&&r.conv>0?fP(r.conv):'N/A'}</div></div>`:''}
      <div class="pts-box">
        ${hasDatos?`<div class="pts" style="${r.pts>0?'color:var(--or2)':'color:rgba(255,255,255,.25)'}">${r.pts}</div>`
        :`<div style="font-size:.65rem;color:rgba(255,255,255,.2)">—</div>`}
      </div>
    </div>`;
  });

  inner+=`</div>`;
  return inner;
}

function filterGC(sem,q,tipo){
  const qn=norm(q);
  document.querySelectorAll(`#gcg${sem} .gc`).forEach(c=>{
    const ng=c.dataset.grp||'';
    const ti=c.dataset.tipo||'';
    const names=Array.from(c.querySelectorAll('.sr-name')).map(x=>norm(x.textContent)).join('|');
    const mQ=!qn||ng.includes(qn.toLowerCase())||names.includes(qn);
    const mT=!tipo||ti===tipo;
    c.style.display=(mQ&&mT)?'':'none';
  });
}

// ── FILE UPLOAD ───────────────────────────────────────────────
async function loadFile(file,sem){if(file && await checkPassword())processFile(file,sem);}
async function dropFile(e,sem){e.preventDefault();const f=e.dataTransfer.files[0];if(f && await checkPassword())processFile(f,sem);}
function resetUp(sem){$('uz'+sem).style.display='';
  const l=$('uw'+sem).querySelector('.up-loaded');if(l)l.remove();}
async function clearSem(sem){
  if(!confirm(`¿Limpiar datos de Semana ${sem}? Esto borrará los resultados de esa semana y el Excel del servidor.`))return;
  try{
    const password=sessionStorage.getItem('mt_pass')||'';
    const resp=await fetch(`/api/weeks/${sem}/clear`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password})
    });
    if(!resp.ok){
      const err=await resp.json().catch(()=>({}));
      throw new Error(err.error||`Error ${resp.status}`);
    }
    delete weekData[sem];
    rSemana(sem);
    toast(`Semana ${sem} limpiada`);
  }catch(err){
    console.error('clearSem error:',err);
    toast('❌ '+err.message,4000);
  }
}

async function processFile(file,sem,shouldUpload=true){
  const errEl=$('err'+sem);
  if(errEl) errEl.innerHTML=`<div class="err">⏳ Leyendo ${file.name}...</div>`;
  try{
    const data=await parseExcelFull(file);
    const cnt=Object.keys(data).length;
    if(cnt===0)throw new Error('No se encontraron tiendas con datos');
    weekData[sem]=data;
    // Subir al backend para persistencia (solo en carga manual, la auto ya está persistida)
    if(shouldUpload){
      try{
        await uploadExcelToBackend(file, sem);
      }catch(upErr){
        console.error('Upload error:', upErr);
        toast('⚠️ Datos cargados localmente, pero no se pudieron guardar en el servidor.', 5000);
      }
    }
    // Refrescar páginas necesarias SIN tocar otras semanas
    ['s'+sem,'inicio','acumulado'].forEach(p=>{
      document.getElementById('page-'+p).dataset.ok='';
    });
    rSemana(sem); document.getElementById('page-s'+sem).dataset.ok='1';
    if($('page-inicio').classList.contains('active'))rInicio();
    if($('page-acumulado').classList.contains('active'))rAcumulado();
    if(errEl)errEl.innerHTML='';
    toast(`✅ Semana ${sem}: ${cnt} tiendas cargadas.`,3000);
  }catch(err){
    if(errEl)errEl.innerHTML=`<div class="err">❌ ${err}</div>`;
    toast('Error al cargar el archivo',4000);
  }
}

function exportSemana(sem){
  const sd=weekData[sem];if(!sd)return;
  let csv='Grupo,Tipo,Tienda,Zona,Cumpl%,UPT,Conv%,Elegible,Pts_Cumpl,Pts_UPT,Pts_Conv,Total_Pts\n';
  D.grupos.forEach(g=>{
    const gp=calcGroupPts(g,sd);
    g.tiendas.forEach(n=>{
      const t=D.tiendas.find(x=>x.nombre===n)||{};
      const v=gp[n]||{};
      const d=matchStore(n,sd)||{};
      csv+=`"${g.nombre}","${g.tipo}","${n}","${t.zona||''}",`;
      csv+=`"${d.cumpl!=null?fP(d.cumpl):'—'}","${d.upt!=null?fN(d.upt):'—'}","${d.conv>0?fP(d.conv):'N/A'}",`;
      csv+=`"${v.eligible?'SI':'NO'}",${v.pts_cumpl||0},${v.pts_upt||0},${v.pts_conv||0},${v.pts||0}\n`;
    });
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download=`Mundial_Tennis_S${sem}.csv`;a.click();
}

// ── HELPERS REMATADORES ──────────────────────────────────────
const isRemat = tipo => tipo.includes('REMATADOR');

function rAcumulado(){
  const el=$('page-acumulado');
  const ctAll=buildCumTable();
  // Grandes premios: solo Línea y Outlet
  const ctCompite=ctAll.filter(r=>!isRemat(r.tipo));

// ── SPECIAL AWARDS COMPUTATION ───────────────────────────────
// Returns {nombre, zona, tipo, valor} for best UPT across all weeks (eligible only)
function getBotaDeOroUPT(){
  let best=null;
  for(let s=1;s<=4;s++){
    const sd=weekData[s]; if(!sd) continue;
    D.tiendas.forEach(t=>{
      const d=matchStore(t.nombre,sd); if(!d) return;
      if(d.cumpl==null||d.cumpl<COND) return; // must be eligible
      if(d.upt==null||d.upt<=0) return;
      if(!best||d.upt>best.valor)
        best={nombre:t.nombre,zona:t.zona,tipo:t.tipo,valor:d.upt,semana:s};
    });
  }
  return best;
}
function getBottinDeOroConv(){
  let best=null;
  for(let s=1;s<=4;s++){
    const sd=weekData[s]; if(!sd) continue;
    D.tiendas.forEach(t=>{
      const d=matchStore(t.nombre,sd); if(!d) return;
      if(d.cumpl==null||d.cumpl<COND) return;
      if(d.conv==null||d.conv<=0) return;
      if(!best||d.conv>best.valor)
        best={nombre:t.nombre,zona:t.zona,tipo:t.tipo,valor:d.conv,semana:s};
    });
  }
  return best;
}
function getPuskasWinner(){
  let best=null;
  for(let s=1;s<=4;s++){
    const sd=weekData[s]; if(!sd) continue;
    D.tiendas.forEach(t=>{
      const d=matchStore(t.nombre,sd); if(!d) return;
      // ticket_promedio stored in weekData if extracted
      const tk=d.ticket||d.valor_ticket||null; if(!tk||tk<=0) return;
      if(!best||tk>best.valor)
        best={nombre:t.nombre,zona:t.zona,tipo:t.tipo,valor:tk,semana:s};
    });
  }
  return best;
}

let rkQ='',rkT='',rkZ='';
function renderAcTable(){
  // Solo Línea y Outlet en el ranking de grandes premios
  let data=buildCumTable().filter(r=>!isRemat(r.tipo));
  if(rkQ){const q=norm(rkQ);data=data.filter(r=>norm(r.nombre).includes(q)||norm(r.zona).includes(q));}
  if(rkT)data=data.filter(r=>r.tipo===rkT);
  if(rkZ)data=data.filter(r=>r.zona===rkZ);
  data.sort((a,b)=>rkSort.dir*((a[rkSort.col]||0)-(b[rkSort.col]||0)));
  const tbody=$('acbody');if(!tbody)return;
  // Ranking global sobre el conjunto filtrado (sin rematadores)
  const baseRank=buildCumTable().filter(r=>!isRemat(r.tipo));
  const globalRank={};baseRank.forEach((r,i)=>{globalRank[r.nombre]=i+1;});
  tbody.innerHTML=data.map((r,i)=>{
    const posG=globalRank[r.nombre]||i+1;
    const prz=posG===1?'🥇 Campeón':posG===2?'🥈 Subcampeón':posG===3?'🥉 3er Puesto':'';
    return `<tr class="${posG<=3?'p'+posG:''}">
      <td>${medal(posG)}</td>
      <td><strong style="font-size:.79rem">${r.nombre}</strong></td>
      <td><span class="badge ${tipoClass(r.tipo)}">${tipoShort(r.tipo)}</span></td>
      <td><small style="color:rgba(255,255,255,.45)">${r.zona}</small></td>
      <td>${r.pts_s1}</td><td>${r.pts_s2}</td><td>${r.pts_s3}</td><td>${r.pts_s4}</td>
      <td class="pts">${r.pts_total}</td>
      <td><span style="font-size:.65rem;color:var(--or2)">${prz}</span></td>
    </tr>`;
  }).join('');
}
function sortAc(col){if(rkSort.col===col)rkSort.dir*=-1;else{rkSort.col=col;rkSort.dir=-1;}renderAcTable();}

      <td><strong>${g.nombre}</strong>${esRemat?` <span style="font-size:.62rem;color:#ff9999">(solo 400K)</span>`:''}</td>

  html+=`</tbody></table></div></div>

function exportAcumulado(){
  const data=buildCumTable();
  let csv='#,Tienda,Tipo,Zona,Grupo,S1,S2,S3,S4,Total,Premio\n';
  const baseRank=data.filter(r=>!isRemat(r.tipo));
  const globalRank={};baseRank.forEach((r,i)=>{globalRank[r.nombre]=i+1;});
  data.forEach((r,i)=>{
    const posG=globalRank[r.nombre];
    const p=isRemat(r.tipo)?'Solo premio grupo':
      posG===1?'Campeon':posG===2?'Subcampeon':posG===3?'3er Puesto':'';
    csv+=`${i+1},"${r.nombre}","${r.tipo}","${r.zona}","${r.grupo_nombre}",${r.pts_s1},${r.pts_s2},${r.pts_s3},${r.pts_s4},${r.pts_total},"${p}"\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='Mundial_Tennis_Ranking_Final.csv';a.click();
}

function exportGanadores(){
  const ct=buildCumTable();
  const semsOK=[1,2,3,4].filter(s=>weekData[s]);
  let csv='Semana,Grupo,Tipo,Ganador(es),Puntos,Premio COP\n';
  semsOK.forEach(s=>{
    const w=getGroupWinners(s);
    D.grupos.forEach(g=>{
      const gw=w[g.id];
      if(gw&&gw.length){
        const gp=calcGroupPts(g,weekData[s]);
        const pts=Math.max(...gw.map(n=>(gp[n]||{}).pts||0));
        csv+=`Semana ${s},"${g.nombre}","${g.tipo}","${gw.join('; ')}",${pts},${META.premios.ganador_grupo}\n`;
      }
    });
  });
  // Top 3 grandes premios — solo Línea y Outlet
  const top3=ct.filter(r=>!isRemat(r.tipo)).slice(0,3);
  const ps=[META.premios.campeon,META.premios.subcampeon,META.premios.tercer_puesto];
  top3.forEach((r,i)=>{
    csv+=`Final,Global,"${r.tipo}","${r.nombre}",${r.pts_total},${ps[i]}\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  a.download='Mundial_Tennis_Premios.csv';a.click();
}

  const navBtns=document.querySelectorAll('.nb[data-page]');
  console.log('[setupListeners] botones encontrados:', navBtns.length);
  navBtns.forEach(btn=>{
    console.log('[setupListeners] bind', btn.dataset.page);
    btn.addEventListener('click',()=>goTo(btn.dataset.page));
  });
  const addWeekBtn=document.getElementById('btn-add-week');
  if(addWeekBtn)addWeekBtn.addEventListener('click',addWeek);
  const saveBtn=document.getElementById('btn-guardar');
  if(saveBtn)saveBtn.addEventListener('click',guardarClick);
  $('scrtop').addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  $('modal').addEventListener('click',closeModal);
  document.querySelector('.mx').addEventListener('click',closeModal);
}
</script>
